name: any-ai-for-notion
version: 0.7.0
title: Any AI for Notion
summary: Any AI for Notion chat client
description: |
  Open-source Flutter app that connects any AI provider to Notion via the
  Notion API, with voice input, reminders, and conversation memory.
license: GPL-3.0
contact: tapeo@users.noreply.github.com
website: https://github.com/tapeo/notion-any-ai
source-code: https://github.com/tapeo/notion-any-ai
issues: https://github.com/tapeo/notion-any-ai/issues

confinement: strict
base: core22
grade: stable

apps:
  any-ai-for-notion:
    command: notion_any_ai
    extensions: [gnome]
    plugs:
      - network
      - audio-record
      - audio-playback
      - desktop
      - desktop-legacy
parts:
  any-ai-for-notion:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart
    override-pull: |
      src="${CRAFT_PROJECT_DIR:-$SNAPCRAFT_PROJECT_DIR}"
      dest="$CRAFT_PART_SRC"
      cd "$src"
      tar cf - \
        --exclude='linux/flutter/ephemeral' \
        lib linux snap assets pubspec.yaml pubspec.lock analysis_options.yaml .metadata env.json \
      | (cd "$dest" && tar xf -)
    override-build: |
      cd "$CRAFT_PART_SRC"
      flutter build linux --release --dart-define-from-file env.json
      mkdir -p "$CRAFT_PART_INSTALL/bin"
      cp -r build/linux/*/release/bundle/* "$CRAFT_PART_INSTALL/bin/"
