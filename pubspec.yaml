name: notion_any_ai
description: "Open-source Flutter chat client that connects OpenAI to Notion via Notion API, with voice input, reminders, and conversation memory."
publish_to: "none"
version: 0.12.0
license: GPL-3.0

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  uuid: ^4.5.1
  http: ^1.4.0
  flutter_secure_storage: ^9.2.4
  package_info_plus: ^8.3.0
  shared_preferences: ^2.5.3
  app_links: ^6.4.0
  url_launcher: ^6.3.1
  crypto: ^3.0.6
  path_provider: ^2.1.5
  equatable: ^2.1.0
  google_fonts: ^6.2.1
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  html: ^0.15.6
  flutter_slidable: ^3.1.2
  record: ^7.1.1
  icons_launcher: ^3.1.0
  flutter_markdown_plus: ^1.0.12
  in_app_review: ^2.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/

icons_launcher:
  image_path: "assets/logo.png"
  platforms:
    android:
      enable: true
      adaptive_background_image: "assets/background.png"
      adaptive_foreground_image: "assets/foreground.png"
    ios:
      enable: true
    macos:
      enable: true
      image_path: "assets/macos.png"
    windows:
      enable: true
      image_path: "assets/logo.png"
    linux:
      enable: true
      image_path: "assets/logo.png"

flutter_native_splash:
  image: assets/foreground.png
  background_image: assets/background.png
  android_12:
    image: assets/foreground.png
    color: "#ffffff"
    icon_background_color: "#ffffff"
